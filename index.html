<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Đăng nhập hệ thống quản lý phân công nhân viên ViStay">
  <title>Đăng Nhập - ViStay Management</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏨</text></svg>">
</head>

<body class="login-body">

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-icon">🏨</span>
        <h1>ViStay Portal</h1>
        <p>Hệ thống Quản lý Phân công & Lương</p>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label for="username">Tên đăng nhập</label>
          <div class="input-wrapper">
            <span class="field-icon">👤</span>
            <input type="text" id="username" required placeholder="Tài khoản..." autocomplete="username">
          </div>
        </div>

        <div class="input-group">
          <label for="password">Mật khẩu</label>
          <div class="input-wrapper">
            <span class="field-icon">🔑</span>
            <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
          </div>
        </div>

        <button type="submit" class="btn btn-login" id="loginBtn">
          <span>🔓 Đăng Nhập</span>
        </button>
      </form>
    </div>
  </div>

  <!-- ===== TOAST CONTAINER ===== -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // API base URL
    const API_URL = `${window.location.origin}/api`;

    if (new URLSearchParams(window.location.search).get('logout') === '1') {
      localStorage.clear();
      window.history.replaceState({}, document.title, window.location.pathname);
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icons = { success: '✅', info: 'ℹ️', warning: '⚠️' };
      toast.innerHTML = `<span>${icons[type] || '✅'}</span><span>${message}</span>`;
      container.appendChild(toast);

      setTimeout(() => {
        toast.classList.add('fade-out');
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    async function handleLogin(event) {
      event.preventDefault();
      const loginBtn = document.getElementById('loginBtn');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');

      const username = usernameInput.value.trim().toLowerCase();
      const password = passwordInput.value;

      if (!username || !password) {
        showToast('Vui lòng điền đầy đủ thông tin', 'warning');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span>⏳ Đang đăng nhập...</span>';

      try {
        // Try connecting to backend API
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          cache: 'no-store'
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Đăng nhập thất bại.');
        }

        // Save token and user info
        localStorage.setItem('vistay_token', data.token);
        localStorage.setItem('vistay_user', JSON.stringify(data.user));
        localStorage.setItem('vistay_mode', 'backend');

        showToast('Đăng nhập thành công! Đang chuyển hướng...', 'success');

        // Redirect based on role
        setTimeout(() => {
          if (data.user.role === 'admin' || data.user.role === 'manager') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'employee.html';
          }
        }, 1000);

      } catch (err) {
        console.warn('Backend login failed, attempting local fallback:', err.message);

        // Local validation fallback
        const validUsers = {
          'vistay': { role: 'admin', name: 'Admin ViStay', staffId: null },
          'lien': { role: 'employee', name: 'Liên', staffId: 1 },
          'thien': { role: 'employee', name: 'Thiên', staffId: 2, techRole: 1 },
          'thuong': { role: 'employee', name: 'Thương', staffId: 3, techRole: 1 },
          'van': { role: 'employee', name: 'Vân', staffId: 4 },
          'dieu': { role: 'manager', name: 'Diệu', staffId: 5 },
          'hoan': { role: 'employee', name: 'Hoàn', staffId: 6 },
          'parttime1': { role: 'employee', name: 'Nhân viên Part-time 1', staffId: 7 },
          'parttime2': { role: 'employee', name: 'Nhân viên Part-time 2', staffId: 8 },
          'loc': { role: 'manager', name: 'Lộc', staffId: 9 }
        };

        if (validUsers[username] && password === '12345678') {
          const user = validUsers[username];
          localStorage.setItem('vistay_token', 'local_fallback_token');
          localStorage.setItem('vistay_user', JSON.stringify({
            id: username === 'vistay' ? 0 : user.staffId,
            username: username,
            role: user.role,
            staffId: user.staffId,
            staffName: user.name,
            techRole: user.techRole || 0
          }));
          localStorage.setItem('vistay_mode', 'local');

          showToast('Đăng nhập (Chế độ offline) thành công!', 'info');

          setTimeout(() => {
            if (user.role === 'admin' || user.role === 'manager') {
              window.location.href = 'admin.html';
            } else {
              window.location.href = 'employee.html';
            }
          }, 1000);
        } else {
          showToast(err.message.includes('Failed to fetch') ? 'Mật khẩu/Tài khoản không đúng (Chế độ Offline)' : err.message, 'warning');
          loginBtn.disabled = false;
          loginBtn.innerHTML = '<span>🔓 Đăng Nhập</span>';
        }
      }
    }

    // Check if already logged in
    document.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('vistay_token');
      const userStr = localStorage.getItem('vistay_user');

      if (token && userStr) {
        try {
          const user = JSON.parse(userStr);
          if (user.role === 'admin' || user.role === 'manager') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'employee.html';
          }
        } catch (e) {
          localStorage.clear();
        }
      }
    });
  </script>
</body>

</html>
